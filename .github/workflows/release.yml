name: Build & Release Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # Release 생성/업로드 권한

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macos
          - os: windows-latest
            name: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install electron deps
        working-directory: electron
        run: npm install

      # electron/ 에는 .git 이 없어 electron-builder가 repo를 못 찾음. 동적으로 주입.
      - name: Inject repository field into electron/package.json
        working-directory: electron
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            p.repository = { type: 'git', url: 'https://github.com/${{ github.repository }}.git' };
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2));
          "

      # 빌드만 — publish는 다음 step에서 race-safe하게 처리
      - name: Build (electron-builder, no publish)
        working-directory: electron
        env:
          # macOS 베타 — 코드사이닝 미사용
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --publish never

      # softprops/action-gh-release는 같은 tag에 대한 동시 호출에 멱등적.
      # 두 OS 잡이 동시에 호출해도 release를 한 번만 만들고, 산출물은 누적 attach.
      - name: Attach binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-electron/*.dmg
            dist-electron/*.exe
            dist-electron/*.yml
            dist-electron/*.blockmap
          fail_on_unmatched_files: false
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 디버그용 artifacts (release attach 실패 시 fallback)
      - name: Upload artifacts (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.name }}
          path: dist-electron/*
          if-no-files-found: warn
          retention-days: 14
